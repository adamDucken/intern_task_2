<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4">
      <h2 class="mb-4 text-center fw-bold">create account</h2>

      <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="min 6 characters"
            required>
        </div>

        <div class="mb-4">
          <label for="role" class="form-label">role</label>
          <select
            class="form-select"
            id="role"
            [(ngModel)]="role"
            name="role">
            <option value="Resident">Resident</option>
            <option value="Manager">Manager</option>
          </select>
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-3" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ loading ? 'creating account...' : 'register' }}
        </button>
      </form>

      <p class="text-center mb-0 text-muted small">
        already have an account? <a routerLink="/login" class="text-dark fw-semibold">sign in</a>
      </p>
    </div>
  </div>
</div>
