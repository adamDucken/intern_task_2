<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4">
      <h2 class="mb-4 text-center fw-bold">sign in</h2>

      <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="password"
            required>
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-3" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ loading ? 'signing in...' : 'sign in' }}
        </button>
      </form>

      <div class="divider text-center text-muted mb-3">
        <span class="divider-text">or</span>
      </div>

      <div id="google-btn" class="d-flex justify-content-center mb-3"></div>

      <p class="text-center mb-0 text-muted small">
        no account? <a routerLink="/register" class="text-dark fw-semibold">register</a>
      </p>
    </div>
  </div>
</div>
